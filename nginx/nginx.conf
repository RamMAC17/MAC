events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Rate limiting zone (10 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream mac_api {
        server mac:8000;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size (for audio/image uploads — STT allows up to 50 MB)
        client_max_body_size 50m;

        # Frontend static files (served directly by nginx)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API proxy — all /api requests go to FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        # Docs
        location /docs {
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
        }

        # Health check
        location /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
