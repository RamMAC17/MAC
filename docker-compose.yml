# ═══════════════════════════════════════════════════════════
#  MAC — MBM AI Cloud  |  Local Server Setup
# ═══════════════════════════════════════════════════════════
#  This runs the ENTIRE AI platform on a single server PC.
#  vLLM serves models on the GPU, MAC API handles everything else.
#
#  Prerequisites:
#    - NVIDIA GPU with 24GB+ VRAM (RTX 3090/4090/A5000/A6000)
#    - Docker + Docker Compose
#    - NVIDIA Container Toolkit (nvidia-docker)
#    - At least 32GB RAM, 100GB+ disk space
#
#  Usage:
#    docker compose up -d              # start everything
#    docker compose logs -f mac        # watch MAC API logs
#    docker compose logs -f vllm-speed # watch speed model logs
#    docker compose down               # stop everything
#
#  GPU Memory Planning (24GB GPU):
#    vllm-speed   (Qwen2.5-7B)         ~  5GB  (gpu_memory_utilization=0.22)
#    vllm-code    (Qwen2.5-Coder-7B)   ~  5GB  (gpu_memory_utilization=0.22)
#    vllm-reason  (DeepSeek-R1-14B)    ~  9GB  (gpu_memory_utilization=0.35)
#    Total                             ~ 19GB / 24GB
#
#  For 48GB+ GPU, uncomment vllm-intel to add Gemma-3-27B.
# ═══════════════════════════════════════════════════════════

services:

  # ── MAC API Server ──────────────────────────────────────
  mac:
    build: .
    container_name: mac-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mac:mac_password@postgres:5432/mac_db
      - REDIS_URL=redis://redis:6379/0
      - VLLM_BASE_URL=http://vllm-speed:8001
      - VLLM_SPEED_URL=http://vllm-speed:8001
      - VLLM_CODE_URL=http://vllm-code:8002
      - VLLM_REASONING_URL=http://vllm-reason:8003
      - VLLM_INTELLIGENCE_URL=http://vllm-intel:8004
      - WHISPER_URL=http://whisper:8005
      - TTS_URL=http://tts:8006
      - EMBEDDING_URL=http://vllm-speed:8001
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mac-net

  # ═══════════════════════════════════════════════════════
  #  vLLM GPU INFERENCE ENGINES
  #  Each model runs as its own vLLM server on the GPU.
  #  Adjust gpu_memory_utilization based on your GPU VRAM.
  # ═══════════════════════════════════════════════════════

  # ── Speed Model: Qwen2.5-7B (fast responses) ──────────
  vllm-speed:
    image: vllm/vllm-openai:latest
    container_name: mac-vllm-speed
    ports:
      - "${VLLM_SPEED_PORT:-8001}:${VLLM_SPEED_PORT:-8001}"
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_SPEED_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --port ${VLLM_SPEED_PORT:-8001}
      --gpu-memory-utilization ${VLLM_SPEED_GPU_MEM:-0.22}
      --max-model-len ${VLLM_SPEED_MAX_LEN:-8192}
      --dtype ${VLLM_DTYPE:-auto}
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - mac-net

  # ── Code Model: Qwen2.5-Coder-7B (coding tasks) ──────
  vllm-code:
    image: vllm/vllm-openai:latest
    container_name: mac-vllm-code
    ports:
      - "${VLLM_CODE_PORT:-8002}:${VLLM_CODE_PORT:-8002}"
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_CODE_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      --port ${VLLM_CODE_PORT:-8002}
      --gpu-memory-utilization ${VLLM_CODE_GPU_MEM:-0.22}
      --max-model-len ${VLLM_CODE_MAX_LEN:-8192}
      --dtype ${VLLM_DTYPE:-auto}
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - mac-net

  # ── Reasoning Model: DeepSeek-R1-14B (math & logic) ──
  vllm-reason:
    image: vllm/vllm-openai:latest
    container_name: mac-vllm-reason
    ports:
      - "${VLLM_REASON_PORT:-8003}:${VLLM_REASON_PORT:-8003}"
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_REASON_MODEL:-deepseek-ai/DeepSeek-R1-Distill-Qwen-14B}
      --port ${VLLM_REASON_PORT:-8003}
      --gpu-memory-utilization ${VLLM_REASON_GPU_MEM:-0.35}
      --max-model-len ${VLLM_REASON_MAX_LEN:-8192}
      --dtype ${VLLM_DTYPE:-auto}
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - mac-net

  # ── Intelligence Model: Gemma-3-27B (OPTIONAL — needs 48GB+ GPU) ──
  # Uncomment this block if your GPU has enough VRAM (48GB+ or dual GPU)
  # vllm-intel:
  #   image: vllm/vllm-openai:latest
  #   container_name: mac-vllm-intel
  #   ports:
  #     - "${VLLM_INTEL_PORT:-8004}:${VLLM_INTEL_PORT:-8004}"
  #   environment:
  #     - HF_HOME=/root/.cache/huggingface
  #   volumes:
  #     - hf-cache:/root/.cache/huggingface
  #   command: >
  #     --model ${VLLM_INTEL_MODEL:-google/gemma-3-27b-it}
  #     --port ${VLLM_INTEL_PORT:-8004}
  #     --gpu-memory-utilization ${VLLM_INTEL_GPU_MEM:-0.45}
  #     --max-model-len ${VLLM_INTEL_MAX_LEN:-4096}
  #     --dtype ${VLLM_DTYPE:-auto}
  #     --trust-remote-code
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped
  #   networks:
  #     - mac-net

  # ═══════════════════════════════════════════════════════
  #  SPEECH & AUDIO SERVICES  (OPTIONAL)
  #  Uncomment to enable STT and TTS.
  #  Whisper uses GPU if available, falls back to CPU.
  #  Piper TTS is CPU-only and very lightweight.
  # ═══════════════════════════════════════════════════════

  # ── Whisper — Speech-to-Text (faster-whisper-server) ───
  # OpenAI-compatible /v1/audio/transcriptions endpoint.
  # Uses ~1 GB VRAM for small, ~2 GB for medium, ~4 GB for large-v3.
  # whisper:
  #   image: fedirz/faster-whisper-server:latest-cuda
  #   container_name: mac-whisper
  #   ports:
  #     - "${WHISPER_PORT:-8005}:8000"
  #   environment:
  #     - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-small}
  #     - WHISPER__DEVICE=auto
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped
  #   networks:
  #     - mac-net

  # ── Whisper CPU-Only (for machines without GPU) ────────
  # whisper:
  #   image: fedirz/faster-whisper-server:latest-cpu
  #   container_name: mac-whisper
  #   ports:
  #     - "${WHISPER_PORT:-8005}:8000"
  #   environment:
  #     - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-small}
  #     - WHISPER__DEVICE=cpu
  #   restart: unless-stopped
  #   networks:
  #     - mac-net

  # ── Piper TTS — Text-to-Speech (CPU, lightweight) ─────
  # OpenAI-compatible /v1/audio/speech endpoint.
  # Very low resource: ~50 MB RAM, CPU only, fast.
  # tts:
  #   image: ghcr.io/matatonic/openedai-speech:latest
  #   container_name: mac-tts
  #   ports:
  #     - "${TTS_PORT:-8006}:8000"
  #   volumes:
  #     - tts-voices:/app/voices
  #   restart: unless-stopped
  #   networks:
  #     - mac-net

  # ═══════════════════════════════════════════════════════
  #  INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════

  # ── PostgreSQL — Persistent data store ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mac-postgres
    environment:
      POSTGRES_USER: mac
      POSTGRES_PASSWORD: mac_password
      POSTGRES_DB: mac_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mac -d mac_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mac-net

  # ── Redis — Rate limiting & caching ────────────────────
  redis:
    image: redis:7-alpine
    container_name: mac-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mac-net

  # ── Nginx — Reverse proxy + static files ───────────────
  nginx:
    image: nginx:alpine
    container_name: mac-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - mac
    restart: unless-stopped
    networks:
      - mac-net

  # ── Qdrant — Vector DB for RAG ─────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mac-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped
    networks:
      - mac-net

  # ── SearXNG — Self-hosted web search ───────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: mac-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - searxngdata:/etc/searxng
    restart: unless-stopped
    networks:
      - mac-net

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  searxngdata:
  hf-cache:      # Shared HuggingFace model cache across all vLLM instances
  tts-voices:    # Persisted TTS voice models

networks:
  mac-net:
    driver: bridge
