# ═══════════════════════════════════════════════════════════
#  MAC — MBM AI Cloud  |  Docker Compose
# ═══════════════════════════════════════════════════════════
#  Usage:
#    docker compose up -d          # start everything
#    docker compose logs -f mac    # watch MAC logs
#    docker compose down           # stop everything
# ═══════════════════════════════════════════════════════════

services:
  # ── MAC API Server ──────────────────────────────────────
  mac:
    build: .
    container_name: mac-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mac:mac_password@postgres:5432/mac_db
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - VLLM_BASE_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - LITELLM_BASE_URL=http://litellm:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mac-net

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mac-postgres
    environment:
      POSTGRES_USER: mac
      POSTGRES_PASSWORD: mac_password
      POSTGRES_DB: mac_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mac -d mac_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mac-net

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mac-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mac-net

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mac-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mac
    restart: unless-stopped
    networks:
      - mac-net

  # ── Qdrant — Vector DB for RAG ─────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mac-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped
    networks:
      - mac-net

  # ── SearXNG — Self-hosted search ───────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: mac-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - searxngdata:/etc/searxng
    restart: unless-stopped
    networks:
      - mac-net

  # ── LiteLLM — Model proxy (optional) ──────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: mac-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    networks:
      - mac-net

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  searxngdata:

networks:
  mac-net:
    driver: bridge
