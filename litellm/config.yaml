# ═══════════════════════════════════════════════════════════
#  MAC — LiteLLM Proxy Configuration
# ═══════════════════════════════════════════════════════════
#  LiteLLM sits between MAC and model backends (Ollama, vLLM)
#  to provide a unified OpenAI-compatible gateway.
#
#  Add more model endpoints here to scale across PCs.
#  Each entry maps a model name to a backend URL.
# ═══════════════════════════════════════════════════════════

model_list:
  # ── Local Ollama models (this PC) ──────────────────────
  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://localhost:11434

  - model_name: deepseek-r1:8b
    litellm_params:
      model: ollama/deepseek-r1:8b
      api_base: http://localhost:11434

  - model_name: llava:7b
    litellm_params:
      model: ollama/llava:7b
      api_base: http://localhost:11434

  - model_name: qwen2.5:14b
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://localhost:11434

  # ── Remote PC models (uncomment & set IP to scale) ─────
  # - model_name: qwen2.5-coder:7b
  #   litellm_params:
  #     model: ollama/qwen2.5-coder:7b
  #     api_base: http://192.168.1.102:11434

  # ── vLLM models (Linux GPU server) ─────────────────────
  # - model_name: qwen2.5-coder:7b
  #   litellm_params:
  #     model: openai/qwen2.5-coder-7b
  #     api_base: http://192.168.1.200:8001/v1

general_settings:
  master_key: sk-mac-litellm-key
  drop_params: true

litellm_settings:
  num_retries: 2
  request_timeout: 120
  fallbacks:
    - qwen2.5-coder:7b: [qwen2.5:14b]
    - deepseek-r1:8b: [qwen2.5:14b]
