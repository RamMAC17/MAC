# ═══════════════════════════════════════════════════════════
#  MAC — LiteLLM Configuration (DEPRECATED)
# ═══════════════════════════════════════════════════════════
#  MAC now connects directly to local vLLM instances.
#  This file is kept for reference only.
#  LiteLLM is no longer needed in the default setup.
# ═══════════════════════════════════════════════════════════

model_list:
  # These are now served directly by vLLM (see docker-compose.yml)
  - model_name: qwen2.5:7b
    litellm_params:
      model: openai/Qwen/Qwen2.5-7B-Instruct
      api_base: http://localhost:8001

  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: openai/Qwen/Qwen2.5-Coder-7B-Instruct
      api_base: http://localhost:8002

  - model_name: deepseek-r1:14b
    litellm_params:
      model: openai/deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
      api_base: http://localhost:8003
      api_base: http://localhost:11434

  # ── Remote PC models (uncomment & set IP to scale) ─────
  # - model_name: qwen2.5-coder:7b
  #   litellm_params:
  #     model: ollama/qwen2.5-coder:7b
  #     api_base: http://192.168.1.102:11434

  # ── vLLM models (Linux GPU server) ─────────────────────
  # - model_name: qwen2.5-coder:7b
  #   litellm_params:
  #     model: openai/qwen2.5-coder-7b
  #     api_base: http://192.168.1.200:8001/v1

general_settings:
  master_key: sk-mac-litellm-key
  drop_params: true

litellm_settings:
  num_retries: 2
  request_timeout: 120
  fallbacks:
    - qwen2.5-coder:7b: [qwen2.5:14b]
    - deepseek-r1:8b: [qwen2.5:14b]
